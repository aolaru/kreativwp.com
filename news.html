<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News | Kreativ WP</title>
  <meta name="description" content="Kreativ WP updates and posts." />
  <meta name="theme-color" content="#0f1526" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://kreativwp.com/news.html" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script>
    (function() {
      var key = "kreativwp-theme";
      var saved = null;
      try {
        saved = localStorage.getItem(key);
      } catch (error) {
        saved = null;
      }
      var systemPrefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      var theme = saved || (systemPrefersLight ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <nav class="top-menu" aria-label="Main">
        <a class="menu-link home-icon" href="/" aria-label="Home" title="Home"><span aria-hidden="true">&#8962;</span><span class="sr-only">Home</span></a>
        <a class="menu-link" href="/news.html">News</a>
        <a class="menu-link" href="/about.html">About</a>
        <a class="menu-link" href="/contact.html">Contact</a>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme"><span class="sr-only">Toggle color theme</span></button>
      </nav>
      <span class="sr-only" id="theme-status" aria-live="polite"></span>
      <img class="logo-mark" src="kreativ-wp-logo-128.svg" width="128" height="128" alt="Kreativ WP logo" />
      <p class="eyebrow">News (Hidden)</p>
      <h1>Publishing Queue</h1>
      <p class="tagline">This page is intentionally hidden until monthly publishing begins.</p>
    </header>
    <section class="card plugin-details">
      <h2>Planned cadence</h2>
      <article class="plugin-detail">
        <h3>Minimum cadence</h3>
        <p>At least one post per month before this section is publicly linked.</p>
      </article>
    </section>
  </main>
  <script>
    (function() {
      var key = "kreativwp-theme";
      var root = document.documentElement;
      var button = document.getElementById("theme-toggle");
      var status = document.getElementById("theme-status");
      var metaTheme = document.querySelector('meta[name="theme-color"]');
      var colors = { dark: "#0f1526", light: "#f3f8ff" };

      function applyTheme(theme, persist) {
        root.setAttribute("data-theme", theme);
        if (metaTheme) metaTheme.setAttribute("content", colors[theme]);
        if (button) {
          var next = theme === "dark" ? "light" : "dark";
          button.setAttribute("data-next-theme", next);
          button.setAttribute("aria-label", next === "light" ? "Switch to light theme" : "Switch to dark theme");
          button.setAttribute("title", button.getAttribute("aria-label"));
        }
        if (status) status.textContent = theme === "dark" ? "Dark theme enabled." : "Light theme enabled.";
        if (persist) {
          try {
            localStorage.setItem(key, theme);
          } catch (error) {
            // Ignore persistence failures (privacy mode, blocked storage).
          }
        }
      }

      var current = root.getAttribute("data-theme") || "dark";
      applyTheme(current, false);
      if (button) button.addEventListener("click", function() {
        var active = root.getAttribute("data-theme") || "dark";
        applyTheme(active === "dark" ? "light" : "dark", true);
      });
    })();
  </script>
</body>
</html>
