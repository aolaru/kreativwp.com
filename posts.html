<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts | Kreativ WP</title>
  <meta name="description" content="Kreativ WP updates and posts." />
  <meta name="theme-color" content="#0f1526" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://kreativwp.com/posts.html" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script>
    (function() {
      var key = "kreativwp-theme";
      var saved = localStorage.getItem(key);
      var systemPrefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      var theme = saved || (systemPrefersLight ? "light" : "dark");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <img class="logo-mark" src="kreativ-wp-logo-128.svg" width="128" height="128" alt="Kreativ WP logo" />
      <p class="eyebrow">Posts (Hidden)</p>
      <h1>Publishing Queue</h1>
      <p class="tagline">This page is intentionally hidden until monthly publishing begins.</p>
    </header>
    <section class="card plugin-details">
      <h2>Planned cadence</h2>
      <article class="plugin-detail">
        <h3>Minimum cadence</h3>
        <p>At least one post per month before this section is publicly linked.</p>
      </article>
    </section>
  </main>
</body>
</html>
